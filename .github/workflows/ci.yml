name: CI/CD Quality Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Check Formatting (Black)
      run: black --check .

    - name: Check Imports Order (isort)
      run: isort --check-only .

    - name: Lint Codebase (Flake8)
      run: flake8 .

    - name: Static Security Scan (Bandit)
      run: bandit -r src/ -x tests/

    - name: Audit Dependencies Vulnerabilities (pip-audit)
      run: pip-audit --strict -r requirements.txt

    - name: Run Test Suite with Coverage
      run: pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v3
      with:
        name: test-coverage-report
        path: coverage.xml
